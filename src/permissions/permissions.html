<!doctype html>
<html lang="zh-CN" data-bs-theme="auto">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prompt Master</title>
  <link href="permissions_custom.css" rel="stylesheet">

  <meta name="theme-color" content="#712cf9">

</head>

<body>

  <div class="custom-container custom-my-5">
    <div class="custom-jumbotron">
      <div class="custom-header-center">
        <img src="../icons/icon128.png" alt="Prompt Master Icon" width="48" height="48" class="custom-header-icon"
          id="header-icon">
        <h1 class="custom-text-emphasis custom-theme-blue" data-i18n="extensionName"></h1>
      </div>
      <p class="custom-lead-text">
        <span data-i18n="openAndSimple"></span>
      </p>

      <div class="custom-container-mt5 custom-onboarding-section">
        <div class="custom-row">
          <div class="custom-col">
            <img src="../icons/onboarding-start.png" alt="Hover to start" class="custom-onboarding-gif">
            <!-- Updated path to onboarding-start.png -->
            <h3 class="custom-onboarding-gif-title" data-i18n="hoverToStart"></h3>
            <p class="custom-onboarding-caption">
              <span data-i18n="orCheckKeyboardShortcuts"></span>
            </p>
          </div>
          <div class="custom-col">
            <img src="../icons/onboarding-start2.png" alt="探索功能" class="custom-onboarding-gif">
            <!-- Updated path to onboarding-start.png -->
            <h3 class="custom-onboarding-gif-title" data-i18n="exploreFeatures"></h3>
            <p class="custom-onboarding-caption" data-i18n="featuresDescription"></p>
          </div>
        </div>
        <!-- COMMENT: Features section (inserted between onboarding row and get-started button) -->
        <section class="custom-features-section" aria-labelledby="features-title">
          <h3 id="features-title" class="custom-features-title" data-i18n="featuresTitle"></h3>
          <!-- COMMENT: Each feature item now includes a subtitle for instant context -->
          <ul class="custom-features-list">
            <!-- COMMENT: Add/remove items to customize the feature list -->
            <li class="custom-feature-item">
              <!-- COMMENT: Subtitle clarifies how the quick-launch workflow behaves -->
              <div class="custom-feature-copy">
                <span class="custom-feature-text" data-i18n="featureQuickAccess"></span>
                <span class="custom-feature-subtitle" data-i18n="featureQuickAccessDesc"></span>
              </div>
            </li>
            <li class="custom-feature-item">
              <!-- COMMENT: Subtitle explains the value of granting host permissions -->
              <div class="custom-feature-copy">
                <span class="custom-feature-text" data-i18n="featureAvailableEverywhere"></span>
                <span class="custom-feature-subtitle" data-i18n="featureAvailableEverywhereDesc"></span>
              </div>
            </li>
            <li class="custom-feature-item">
              <!-- COMMENT: Subtitle highlights dynamic placeholder collection -->
              <div class="custom-feature-copy">
                <span class="custom-feature-text" data-i18n="featureAdvanced"></span>
                <span class="custom-feature-subtitle" data-i18n="featureAdvancedDesc"></span>
              </div>
            </li>
            <li class="custom-feature-item">
              <!-- COMMENT: Subtitle calls out multi-surface availability -->
              <div class="custom-feature-copy">
                <span class="custom-feature-text" data-i18n="featureKeyboardShortcuts"></span>
                <span class="custom-feature-subtitle" data-i18n="featureKeyboardShortcutsDesc"></span>
              </div>
            </li>
            <li class="custom-feature-item">
              <!-- COMMENT: Subtitle reassures users about data portability -->
              <div class="custom-feature-copy">
                <span class="custom-feature-text" data-i18n="featureSimpleAndEasy"></span>
                <span class="custom-feature-subtitle" data-i18n="featureSimpleAndEasyDesc"></span>
              </div>
            </li>
            <li class="custom-feature-item">
              <!-- COMMENT: Subtitle explains how hot corner activation works -->
              <div class="custom-feature-copy">
                <span class="custom-feature-text" data-i18n="featureOpenSource"></span>
                <span class="custom-feature-subtitle" data-i18n="featureOpenSourceDesc"></span>
              </div>
            </li>
          </ul>
        </section>
        <!-- Get Started Button Placeholder -->
        <div id="get-started-btn-container" style="margin-top: 2rem;"></div>
      </div>

      <div class="custom-container-mt5">
        <!-- Collection -->
        <div class="custom-section-border">
          <!-- Title inside the border -->
          <span class="custom-badge-absolute">
            <small class="custom-badge-text" data-i18n="permissionsGranted"></small>
          </span>

          <!-- Buttons -->
          <div id="permission-granted" class="custom-flex-wrap-group">
          </div>
        </div>
      </div>
      <div class="custom-container-mt5">
        <!-- Collection -->
        <div class="custom-section-border">
          <!-- Title inside the border -->
          <span class="custom-badge-absolute">
            <small class="custom-badge-text" data-i18n="permissionsAvailable"></small>
          </span>

          <!-- Buttons -->
          <div id="request-permission" class="custom-flex-wrap-group">
          </div>
          <!-- COMMENT: Actions to grant/revoke all optional host permissions -->
          <div style="margin-top: 1rem; text-align: center; display: flex; gap: 0.5rem; justify-content: center;">
            <button id="grant-all-permissions" class="custom-button" style="padding: 0.5rem 0.9rem;">
              <span data-i18n="grantAllPermissions"></span>
            </button>
            <button id="remove-all-permissions" class="custom-button" style="padding: 0.5rem 0.9rem;">
              <span data-i18n="removeAllPermissions"></span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="permissions.js"></script>

  <!-- Footer Area: Links to Gitee, Chrome Store, and CC License -->
  <footer class="custom-footer">
    <div class="custom-footer-content">
      <!-- Replace the href values with your actual links -->
      <a href="https://gitee.com/ye_sheng0839/prompt-master" target="_blank" rel="noopener"
        class="custom-footer-link">Gitee</a>
      &nbsp;|&nbsp;
      <a href="https://microsoftedge.microsoft.com/addons/detail/promptmaster/decdbjbmghcogkbpjpfknillkabahdni"
        target="_blank" rel="noopener" class="custom-footer-link">Edge Store</a>
      &nbsp;|&nbsp;
      <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noopener"
        class="custom-footer-link">CC BY 4.0</a>
    </div>
  </footer>

</body>

</html>
